services:
  # Database with standard PostgreSQL + pgvector
  db:
    image: pgvector/pgvector:pg18
    container_name: legalrightsnavigator-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: legalrights_db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql18/data

volumes:
  db-data:
    driver: local
